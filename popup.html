<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X关注助手 - 配置 (X Follower Checker Config)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 320px;
            margin: 0;
            padding: 16px;
            background-color: #ffffff;
            color: #0f1419;
        }
        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: bold;
        }
        p.desc {
            font-size: 13px;
            color: #536471;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cfd9de;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            border-color: rgb(29, 155, 240);
        }
        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
            align-items: center;
        }
        #status-msg {
            color: rgb(0, 186, 124);
            font-size: 13px;
            margin-right: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        button {
            background-color: rgb(29, 155, 240);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: rgb(26, 140, 216);
        }
    </style>
</head>
<body>
    <h2>自定义回复库 (Custom Replies)</h2>
    <p class="desc">每行输入一条回复内容。当在发送框模式切换为“自定义”时将随机抽取。<br>(Enter one reply per line. Will be randomly picked when mode is "Custom".)</p>
    <textarea id="replies-input" placeholder="输入自定义回复内容...&#10;Input custom replies here..."></textarea>
    <div class="btn-container">
        <span id="status-msg">已保存 (Saved!)</span>
        <button id="save-btn">保存并应用 (Save)</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
